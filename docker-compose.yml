version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bookspace
      POSTGRES_USER: bookspace_user
      POSTGRES_PASSWORD: password
    volumes:
      - bookspace_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      - db
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    environment:
      - CHOKIDAR_USEPOLLING=true
volumes:
  bookspace_data:
