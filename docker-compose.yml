version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bookspace
      POSTGRES_USER: bookspace_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - bookspace_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        # Empty string → relative URLs, nginx proxy handles API routing
        REACT_APP_API_BASE: ""
    environment:
      - CHOKIDAR_USEPOLLING=true

  proxy:
    build:
      context: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend

volumes:
  bookspace_data:
