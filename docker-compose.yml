version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bookspace
      POSTGRES_USER: bookspace_user
      POSTGRES_PASSWORD: password
    volumes:
      - bookspace_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        # Empty string → relative URLs, nginx proxy handles API routing
        REACT_APP_API_BASE: ""
    environment:
      - CHOKIDAR_USEPOLLING=true

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  bookspace_data:
